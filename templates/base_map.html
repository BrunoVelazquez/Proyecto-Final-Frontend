<!doctype html>
<html lang="es">
<head>
  <title>{% block title %}Censo Aéreo{% endblock %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/universal.css') }}" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" crossorigin=""/>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; overflow: hidden; }
    
    #map { 
      width: 100%; 
      height: 100vh; 
      position: absolute; 
      top: 0; left: 0; z-index: 1; 
    }
    
    #ui-layer {
      position: absolute;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
    }
    
    #ui-layer > * { pointer-events: auto; }
    
    {% block extra_css %}{% endblock %}
  </style>
</head>

<body>
  <div id="map"></div>
  
  <div id="ui-layer">
    {% block ui_overlays %}
    {% endblock %}
  </div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" crossorigin=""></script>
  
  <script>
    const map = L.map('map', {zoomControl: false}).setView([-38.7196, -62.2724], 12); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);
  </script>
  
  {% block extra_js %}{% endblock %}
</body>
</html>
