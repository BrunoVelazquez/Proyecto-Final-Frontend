{% extends "base_map.html" %}

<div id="vista-principal" class="fab-container-left">
  <button class="map-pill-btn" id="btn-cargar">Cargar campaña</button>
</div>

<div id="vista-carga" class="menu-panel" style="display: none;">
  <h3 style="margin-bottom: 12px; font-size: 16px; color: #333;">Nueva Campaña</h3>

</div>
{% endblock %}

<!-- Lightbox DOM -->
<div id="lb-overlay">
  <div id="lb-panel">
    <div id="lb-header">
      <span id="lb-title">—</span>
      <button id="lb-close">✕</button>
    </div>
    <div id="lb-body">
      <div id="lb-canvas-wrap">
        <canvas id="lb-canvas"></canvas>
      </div>
      <div id="lb-sidebar">
        <h4>Editor de detecciones</h4>
        <div id="lb-tools">
          <button class="lb-tool-btn active" id="tool-select">✦ Sel</button>
          <button class="lb-tool-btn" id="tool-draw">✏ Draw</button>
          <button class="lb-tool-btn" id="tool-delete">🗑 Borrar</button>
        </div>

        <div style="margin: 10px 12px 2px; font-size: 11px; color: #90cdf4;">Cambiar a</div>
        <select id="lb-class-select" disabled></select>
        <h4 style="margin-top: 10px;">Objetos encontrados</h4>
        <div id="lb-box-list"></div>

        <button id="lb-save-btn">💾 Guardar</button>
        <div id="lb-status"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════════
  //  MAPA
  // ═══════════════════════════════════════════════════════
  const btnCargar = document.getElementById('btn-cargar');
  const btnNueva = document.getElementById('btn-nueva');
  const btnCancelar = document.getElementById('btn-cancelar');
  const btnProcesar = document.getElementById('btn-procesar');
  const vistaPrincipal = document.getElementById('vista-principal');
  const vistaCarga = document.getElementById('vista-carga');

  btnNueva.addEventListener('click', () => {
    vistaPrincipal.style.display = 'none';
    vistaCarga.style.display = 'block';
  });
  btnCancelar.addEventListener('click', () => {
    vistaCarga.style.display = 'none';
    vistaPrincipal.style.display = 'flex';
  });
  btnProcesar.addEventListener('click', () => {
    const c = map.getCenter();
    const lat = c.lat + (Math.random() - .5) * .05;
    const lng = c.lng + (Math.random() - .5) * .05;
    L.circleMarker([lat, lng], markerStyle(0))
      .bindPopup(`<b>Marcador aleatorio</b><br>Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}`)
      .addTo(map);
    btnCancelar.click();
  });

  function markerStyle(count) {
    const r = Math.min(35, 5 + count * 2);
    const opacity = Math.min(0.7, 0.15 + count * 0.04);
    return { color: 'green', fillColor: 'green', fillOpacity: opacity, opacity: 0.7, radius: r, weight: 2 };
  }

  btnCargar.addEventListener('click', async () => {
    try {
      // 1. Cargar KML y categorías en paralelo
      const [kmlRes, catRes] = await Promise.all([
        fetch("{{ url_for('static', filename='censo_peninsula_valdes.kml') }}"),
        fetch('/data/categories').then(r => r.json())
      ]);
      if (!kmlRes.ok) throw new Error('No se pudo cargar el KML');

      const xml = new DOMParser().parseFromString(await kmlRes.text(), 'text/xml');
      const placemarks = Array.from(xml.getElementsByTagName('Placemark'));

      // Mapa id → {name, color}
      const categories = {};
      catRes.categories.forEach(c => {
        categories[c.id] = {
          name: c.name,
          color: CLASS_COLORS[c.id % CLASS_COLORS.length]
        };
      });

      // 2. Parsear entradas del KML
      const entries = placemarks.map(pm => {
        const name = pm.getElementsByTagName('name')[0].textContent.trim();
        const [lonStr, latStr] = pm.getElementsByTagName('coordinates')[0]
          .textContent.trim().split(',');
        return { name, lat: parseFloat(latStr), lon: parseFloat(lonStr) };
      });

      // 3. Cargar labels de todas las imágenes en paralelo
      const labelsAll = await Promise.all(
        entries.map(e =>
          fetch(`/data/labels/${e.name}`)
            .then(r => r.json())
            .then(d => d.boxes)
            .catch(() => [])
        )
      );

      // 4. Construir un featureGroup por clase
      //    featureGroups = { classId: L.featureGroup() }
      const featureGroups = {};

      entries.forEach(({ name, lat, lon }, i) => {
        const boxes = labelsAll[i];
        const imgUrl = `/data/images/${name}`;

        // Contar detecciones por clase en esta imagen
        const countByClass = {};
        boxes.forEach(b => {
          countByClass[b.id] = (countByClass[b.id] || 0) + 1;
        });

        const totalCount = boxes.length;

        // Crear (o reutilizar) un marcador por clase presente en la imagen
        // Si la imagen no tiene detecciones, la mostramos en un grupo "sin_detecciones"
        if (totalCount === 0) {
          if (!featureGroups['_none']) {
            featureGroups['_none'] = L.featureGroup();
          }
          L.circleMarker([lat, lon], {
            color: '#aaaaaa', fillColor: '#aaaaaa',
            fillOpacity: 0.15, opacity: 0.5, radius: 5, weight: 2
          })
            .bindPopup(buildPopup(name, imgUrl, lat, lon, [], categories))
            .addTo(featureGroups['_none']);
          return;
        }

        // Un marcador por cada clase detectada en la imagen
        Object.entries(countByClass).forEach(([classIdStr, count]) => {
          const classId = parseInt(classIdStr);
          const cat = categories[classId] || { name: `clase_${classId}`, color: '#ffffff' };

          if (!featureGroups[classId]) {
            featureGroups[classId] = L.featureGroup();
          }

          const r = Math.min(35, 5 + count * 2);
          const opacity = Math.min(0.7, 0.15 + count * 0.04);

          L.circleMarker([lat, lon], {
            color: cat.color,
            fillColor: cat.color,
            fillOpacity: opacity,
            opacity: 0.8,
            radius: r,
            weight: 2
          })
            .bindPopup(buildPopup(name, imgUrl, lat, lon, boxes, categories))
            .addTo(featureGroups[classId]);
        });
      });

      // 5. Agregar todos los grupos al mapa
      const overlays = {};
      Object.entries(featureGroups).forEach(([classId, group]) => {
        group.addTo(map);
        if (classId === '_none') {
          overlays['sin detecciones'] = group;
        } else {
          const cat = categories[parseInt(classId)];
          const label = buildLayerLabel(cat.name, cat.color);
          overlays[label] = group;
        }
      });

      // 6. Control de capas (esquina superior derecha, igual que mapa_con_locators)
      L.control.layers(null, overlays, {
        collapsed: false,
        position: 'topright',
        autoZIndex: true
      }).addTo(map);

      // Zoom para englobar todo
      const allGroups = Object.values(featureGroups);
      if (allGroups.length) {
        map.fitBounds(L.featureGroup(allGroups).getBounds().pad(0.1));
      }

    } catch (err) {
      console.error(err);
      alert('Error al cargar la campaña: ' + err.message);
    }
  });

  // ── Helpers ──────────────────────────────────────────────

  // Etiqueta del control de capas con punto de color
  function buildLayerLabel(name, color) {
    return `<span style="display:inline-flex; align-items:center; gap:5px;">
    <span style="display:inline-block; width:10px; height:10px;
                 border-radius:50%; background:${color};"></span>
    ${name}
  </span>`;
  }

  // Popup compartido
  function buildPopup(name, imgUrl, lat, lon, boxes, categories) {
    // Resumen de detecciones por clase
    const countByClass = {};
    boxes.forEach(b => { countByClass[b.id] = (countByClass[b.id] || 0) + 1; });

    const detailRows = Object.entries(countByClass).map(([id, count]) => {
      const cat = categories[parseInt(id)] || { name: `clase_${id}`, color: '#aaa' };
      return `<div style="display:flex; align-items:center; gap:5px; margin-bottom:3px;">
      <span style="width:8px; height:8px; border-radius:50%;
                   background:${cat.color}; flex-shrink:0;"></span>
      <span style="font-size:11px;">${cat.name}: <b>${count}</b></span>
    </div>`;
    }).join('');

    return `
    <div style="text-align:center; font-family:system-ui; min-width:190px;">
      <div style="font-weight:700; font-size:11px; color:#555; margin-bottom:6px;
                  word-break:break-all;">${name}</div>
      ${detailRows || '<div style="font-size:11px; color:#999;">Sin detecciones</div>'}
      <img src="${imgUrl}"
           style="width:100%; border-radius:5px; cursor:zoom-in; margin-top:8px;
                  border:1px solid #ddd; background:#f0f0f0;
                  max-height:140px; object-fit:cover;"
           onerror="this.src='https://via.placeholder.com/220x130?text=Sin+foto'"
           onclick="openLightbox('${name}', '${imgUrl}')"
           title="Click para editar detecciones">
      <div style="margin-top:8px;">
        <button onclick="openLightbox('${name}', '${imgUrl}')"
                style="width:100%; padding:5px 8px; background:#1D9E75; color:white;
                       border:none; border-radius:5px; cursor:pointer; font-size:11px;">
          🔍 Abrir editor
        </button>
      </div>
      <div style="margin-top:5px; font-size:10px; color:#999;">
        ${lat.toFixed(6)}, ${lon.toFixed(6)}
      </div>
    </div>`;
  }

  // ═══════════════════════════════════════════════════════
  //  LIGHTBOX + EDITOR DE BOUNDING BOXES
  // ═══════════════════════════════════════════════════════
  const overlay = document.getElementById('lb-overlay');
  const canvas = document.getElementById('lb-canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('lb-canvas-wrap');
  const titleEl = document.getElementById('lb-title');
  const boxList = document.getElementById('lb-box-list');
  const classSelect = document.getElementById('lb-class-select');
  const saveBtn = document.getElementById('lb-save-btn');
  const statusEl = document.getElementById('lb-status');
  const deleteBtn = document.getElementById('tool-delete');

  const CLASS_COLORS = [
    '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
    '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
    '#F1948A', '#82E0AA', '#F8C471', '#AED6F1', '#A9DFBF'
  ];

  let categories = {};
  let boxes = [];
  let selectedIdx = -1;
  let hoveredIdx = -1;
  let currentFile = '';
  let tool = 'select';

  let scale = 1, panX = 0, panY = 0;
  let imgNat = { w: 1, h: 1 };
  let imgObj = null;

  let drag = { active: false, type: null, idx: -1, sx: 0, sy: 0, ox: 0, oy: 0, ow: 0, oh: 0, handle: null };
  let drawing = { active: false, sx: 0, sy: 0, ex: 0, ey: 0 };

  // ── Abrir lightbox ──────────────────────────────────────
  async function openLightbox(filename, imgUrl) {
    currentFile = filename;
    titleEl.textContent = filename;
    overlay.classList.add('active');
    statusEl.textContent = '';
    selectedIdx = -1;
    hoveredIdx = -1;
    deleteBtn.style.display = 'none';

    const [catRes, labRes] = await Promise.all([
      fetch('/data/categories').then(r => r.json()),
      fetch(`/data/labels/${filename}`).then(r => r.json())
    ]);

    categories = {};
    catRes.categories.forEach(c => { categories[c.id] = c.name; });
    classSelect.innerHTML = catRes.categories
      .map(c => `<option value="${c.id}">${c.id}: ${c.name}</option>`)
      .join('');

    boxes = labRes.boxes;

    imgObj = new Image();
    imgObj.onload = () => {
      imgNat.w = imgObj.naturalWidth;
      imgNat.h = imgObj.naturalHeight;
      fitImage();
      renderAll();
      renderBoxList();
    };
    imgObj.src = imgUrl;
  }

  // ── Cerrar ──────────────────────────────────────────────
  document.getElementById('lb-close').onclick = () => {
    overlay.classList.remove('active');
    imgObj = null; boxes = []; selectedIdx = -1; hoveredIdx = -1;
    scale = 1; panX = 0; panY = 0;
    deleteBtn.style.display = 'none';
  };
  overlay.addEventListener('click', e => {
    if (e.target === overlay) document.getElementById('lb-close').click();
  });

  // ── Herramientas ────────────────────────────────────────
  document.getElementById('tool-select').onclick = () => setTool('select');
  document.getElementById('tool-draw').onclick = () => setTool('draw');

  function setTool(t) {
    tool = t;
    document.getElementById('tool-select').classList.toggle('active', t === 'select');
    document.getElementById('tool-draw').classList.toggle('active', t === 'draw');
    wrap.style.cursor = t === 'draw' ? 'crosshair' : 'default';
  }

  deleteBtn.addEventListener('click', () => {
    if (selectedIdx < 0) return;
    boxes.splice(selectedIdx, 1);
    selectedIdx = -1;
    hoveredIdx = -1;
    deleteBtn.style.display = 'none';
    renderAll();
    renderBoxList();
  });

  // ── Fit imagen ──────────────────────────────────────────
  function fitImage() {
    const W = wrap.clientWidth, H = wrap.clientHeight;
    canvas.width = W; canvas.height = H;
    const scaleX = W / imgNat.w, scaleY = H / imgNat.h;
    scale = Math.min(scaleX, scaleY) * 0.92;
    panX = (W - imgNat.w * scale) / 2;
    panY = (H - imgNat.h * scale) / 2;
  }

  // ── Conversión coords ───────────────────────────────────
  function canvasToNorm(cx, cy) {
    return { x: (cx - panX) / (imgNat.w * scale), y: (cy - panY) / (imgNat.h * scale) };
  }
  function normToCanvas(nx, ny) {
    return { x: nx * imgNat.w * scale + panX, y: ny * imgNat.h * scale + panY };
  }

  // ── renderAll ───────────────────────────────────────────
  function renderAll() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    if (!imgObj) return;
    ctx.drawImage(imgObj, panX, panY, imgNat.w * scale, imgNat.h * scale);

    boxes.forEach((b, i) => {
      const color = CLASS_COLORS[b.id % CLASS_COLORS.length];
      const tl = normToCanvas(b.cx - b.w / 2, b.cy - b.h / 2);
      const br = normToCanvas(b.cx + b.w / 2, b.cy + b.h / 2);
      const bw = br.x - tl.x;
      const bh = br.y - tl.y;
      const isHovered = i === hoveredIdx;
      const isSelected = i === selectedIdx;

      // Relleno si seleccionado
      if (isSelected) {
        ctx.fillStyle = color + '22';
        ctx.fillRect(tl.x, tl.y, bw, bh);
      }

      // Borde
      ctx.strokeStyle = color;
      ctx.lineWidth = isSelected ? 2.5 : isHovered ? 2 : 1.5;
      ctx.strokeRect(tl.x, tl.y, bw, bh);

      // Etiqueta
      const label = `${b.id}: ${b.name}`;
      ctx.font = '11px system-ui';
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = color + 'cc';
      ctx.fillRect(tl.x, tl.y - 16, tw + 6, 16);
      ctx.fillStyle = '#000';
      ctx.fillText(label, tl.x + 3, tl.y - 3);

      // Handles si seleccionado
      if (isSelected) drawHandles(tl.x, tl.y, bw, bh, color);
    });

    // Preview de nuevo bbox
    if (drawing.active) {
      ctx.strokeStyle = '#1D9E75';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      ctx.strokeRect(
        Math.min(drawing.sx, drawing.ex),
        Math.min(drawing.sy, drawing.ey),
        Math.abs(drawing.ex - drawing.sx),
        Math.abs(drawing.ey - drawing.sy)
      );
      ctx.setLineDash([]);
    }
  }

  // ── drawHandles ─────────────────────────────────────────
  function drawHandles(x, y, w, h, color) {
    const pts = [
      [x, y], [x + w / 2, y], [x + w, y],
      [x, y + h / 2], [x + w, y + h / 2],
      [x, y + h], [x + w / 2, y + h], [x + w, y + h],
    ];
    pts.forEach(([hx, hy]) => {
      ctx.fillStyle = color;
      ctx.fillRect(hx - 4, hy - 4, 8, 8);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(hx - 4, hy - 4, 8, 8);
    });
  }

  // ── Lista lateral ───────────────────────────────────────
  function renderBoxList() {
    boxList.innerHTML = boxes.map((b, i) => {
      const color = CLASS_COLORS[b.id % CLASS_COLORS.length];
      return `<div class="lb-box-item ${i === selectedIdx ? 'selected' : ''}" onclick="selectBox(${i})">
      <div class="lb-box-dot" style="background:${color}"></div>
      <span class="lb-box-label">${b.id}: ${b.name}</span>
    </div>`;
    }).join('');
  }

  function selectBox(i) {
    selectedIdx = i;
    const selectEl = document.getElementById('lb-class-select');

    if (i >= 0) {
      selectEl.value = boxes[i].id;
      selectEl.disabled = false; // Habilitar cuando hay selección
      deleteBtn.style.display = 'block';
    } else {
      selectEl.disabled = true;  // Deshabilitar cuando no hay nada
      deleteBtn.style.display = 'none';
    }
    renderAll();
    renderBoxList();
  }

  classSelect.addEventListener('change', () => {
    if (selectedIdx < 0) return;
    const newId = parseInt(classSelect.value);
    boxes[selectedIdx].id = newId;
    boxes[selectedIdx].name = categories[newId] || `clase_${newId}`;
    renderAll();
    renderBoxList();
  });

  // ── Zoom con rueda ──────────────────────────────────────
  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    panX = mx - (mx - panX) * factor;
    panY = my - (my - panY) * factor;
    scale *= factor;
    renderAll();
  }, { passive: false });

  // ── Mouse down ──────────────────────────────────────────
  wrap.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;

    if (tool === 'draw') {
      drawing = { active: true, sx: cx, sy: cy, ex: cx, ey: cy };
      return;
    }

    // Handle de resize sobre el box seleccionado
    if (selectedIdx >= 0) {
      const h = hitHandle(cx, cy, selectedIdx);
      if (h) {
        const b = boxes[selectedIdx];
        drag = {
          active: true, type: 'resize', idx: selectedIdx,
          sx: cx, sy: cy, ox: b.cx, oy: b.cy, ow: b.w, oh: b.h, handle: h
        };
        return;
      }
    }

    // Click sobre un box
    const hit = hitBox(cx, cy);
    if (hit >= 0) {
      selectBox(hit);
      const b = boxes[hit];
      drag = {
        active: true, type: 'move', idx: hit,
        sx: cx, sy: cy, ox: b.cx, oy: b.cy, ow: b.w, oh: b.h
      };
      return;
    }

    // Pan
    selectBox(-1);
    drag = { active: true, type: 'pan', sx: cx, sy: cy, ox: panX, oy: panY };
  });

  // ── Mouse move ──────────────────────────────────────────
  wrap.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;

    if (drawing.active) {
      drawing.ex = cx; drawing.ey = cy;
      renderAll();
      return;
    }

    if (drag.active) {
      const dx = cx - drag.sx, dy = cy - drag.sy;
      const dxN = dx / (imgNat.w * scale), dyN = dy / (imgNat.h * scale);
      if (drag.type === 'pan') {
        panX = drag.ox + dx; panY = drag.oy + dy;
      } else if (drag.type === 'move') {
        const b = boxes[drag.idx];
        b.cx = Math.max(b.w / 2, Math.min(1 - b.w / 2, drag.ox + dxN));
        b.cy = Math.max(b.h / 2, Math.min(1 - b.h / 2, drag.oy + dyN));
      } else if (drag.type === 'resize') {
        resizeBox(drag.idx, drag.handle, dxN, dyN, drag);
      }
      renderAll();
      return;
    }

    // Hover
    const newHover = hitBox(cx, cy);
    if (newHover !== hoveredIdx) {
      hoveredIdx = newHover;
      renderAll();
    }
    wrap.style.cursor = tool === 'draw' ? 'crosshair' : newHover >= 0 ? 'pointer' : 'default';
  });

  // ── Mouse up ────────────────────────────────────────────
  wrap.addEventListener('mouseup', e => {
    if (drawing.active) {
      const rect = canvas.getBoundingClientRect();
      finishDraw(drawing.sx, drawing.sy, e.clientX - rect.left, e.clientY - rect.top);
      drawing.active = false;
    }
    drag.active = false;
  });
  wrap.addEventListener('mouseleave', () => {
    drag.active = false; drawing.active = false;
    hoveredIdx = -1; renderAll();
  });

  // ── Hit testing ─────────────────────────────────────────
  function hitBox(cx, cy) {
    for (let i = boxes.length - 1; i >= 0; i--) {
      const b = boxes[i];
      const tl = normToCanvas(b.cx - b.w / 2, b.cy - b.h / 2);
      const br = normToCanvas(b.cx + b.w / 2, b.cy + b.h / 2);
      if (cx >= tl.x && cx <= br.x && cy >= tl.y && cy <= br.y) return i;
    }
    return -1;
  }

  const HANDLE_NAMES = ['tl', 'tc', 'tr', 'ml', 'mr', 'bl', 'bc', 'br'];
  function hitHandle(cx, cy, idx) {
    const b = boxes[idx];
    const tl = normToCanvas(b.cx - b.w / 2, b.cy - b.h / 2);
    const br = normToCanvas(b.cx + b.w / 2, b.cy + b.h / 2);
    const pts = [
      [tl.x, tl.y], [(tl.x + br.x) / 2, tl.y], [br.x, tl.y],
      [tl.x, (tl.y + br.y) / 2], [br.x, (tl.y + br.y) / 2],
      [tl.x, br.y], [(tl.x + br.x) / 2, br.y], [br.x, br.y],
    ];
    for (let i = 0; i < pts.length; i++) {
      if (Math.abs(cx - pts[i][0]) < 7 && Math.abs(cy - pts[i][1]) < 7) return HANDLE_NAMES[i];
    }
    return null;
  }

  function resizeBox(idx, handle, dxN, dyN, d) {
    const b = boxes[idx];
    let cx = d.ox, cy = d.oy, w = d.ow, h = d.oh;
    if (handle.includes('l')) { cx = d.ox - dxN / 2; w = Math.max(0.01, d.ow - dxN); }
    if (handle.includes('r')) { cx = d.ox + dxN / 2; w = Math.max(0.01, d.ow + dxN); }
    if (handle.includes('t')) { cy = d.oy - dyN / 2; h = Math.max(0.01, d.oh - dyN); }
    if (handle.includes('b')) { cy = d.oy + dyN / 2; h = Math.max(0.01, d.oh + dyN); }
    b.cx = cx; b.cy = cy; b.w = w; b.h = h;
  }

  // ── Dibujar nuevo bbox ──────────────────────────────────
  function finishDraw(sx, sy, ex, ey) {
    if (Math.abs(ex - sx) < 8 || Math.abs(ey - sy) < 8) return;
    const tlN = canvasToNorm(Math.min(sx, ex), Math.min(sy, ey));
    const brN = canvasToNorm(Math.max(sx, ex), Math.max(sy, ey));
    const cx = (tlN.x + brN.x) / 2, cy = (tlN.y + brN.y) / 2;
    const w = brN.x - tlN.x, h = brN.y - tlN.y;
    const classId = parseInt(classSelect.value) || 0;
    boxes.push({ id: classId, name: categories[classId] || `clase_${classId}`, cx, cy, w, h });
    selectBox(boxes.length - 1);
    setTool('select');
  }

  // ── Guardar ─────────────────────────────────────────────
  // saveBtn.addEventListener('click', async () => {
  //   statusEl.textContent = 'Guardando…';
  //   try {
  //     const res  = await fetch(`/data/labels/${currentFile}`, {
  //       method: 'POST',
  //       headers: { 'Content-Type': 'application/json' },
  //       body: JSON.stringify({ boxes })
  //     });
  //     const data = await res.json();
  //     statusEl.textContent = `✅ ${data.saved} bbox guardados`;
  //     setTimeout(() => { statusEl.textContent = ''; }, 3000);
  //   } catch (err) {
  //     statusEl.textContent = '❌ Error al guardar';
  //     console.error(err);
  //   }
  // });

  // ── Guardar (simulado) ──────────────────────────────────
  saveBtn.addEventListener('click', () => {
    statusEl.textContent = 'Guardando…';
    // Simular un pequeño delay
    setTimeout(() => {
      statusEl.textContent = `✅ ${boxes.length} bbox guardados`;
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    }, 400);
  });

  window.openLightbox = openLightbox;
</script>
